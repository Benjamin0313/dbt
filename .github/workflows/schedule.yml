name: batch_snowflake

on:
    workflow_dispatch:

    #schedule:
    #   - cron: "0 7 * * *"

jobs:
    batch_snowflake:
        name: batch_snowflake
        runs-on: ubuntu-latest

        steps:
        - name: Check out
          uses: actions/checkout@master

        - uses: actions/setup-python@v1
          with:
            python-version: "3.8.x"

        - name: Install Dependencies
          run: |
            pip install dbt-snowflake
            python3 -m pip install --upgrade pip
        
        - name: Set Profiles
          run: |
            mkdir ~/.dbt
            cat << EOF > ~/.dbt/profiles.yml
            dbt_poc:
              target: dev
              outputs:
                dev:
                  type:      snowflake
                  account:   on44798-ded_sandbox # ${{ secrets.ACCOUNT }}
                  user:      d.harato@datumstudio.jp # ${{ secrets.USER }}
                  password:  daikon0313 # ${{ secrets.PASSWORD }}
                  role:      sysadmin
                  warehouse: d_harato_wh
                  database:  d_harato_db
                  schema:    dbt
                  threads:   4
                  authenticator: username_password_mfa
            EOF
            cat ~/.dbt/profiles.yml

        - name: Run dbt
          working-directory: dbt_poc
          run: |
            dbt debug
            dbt deps
            dbt run
